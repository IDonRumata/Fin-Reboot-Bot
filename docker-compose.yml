version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finbot
      POSTGRES_PASSWORD: finbot_pass
      POSTGRES_DB: finbot_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U finbot -d finbot_db" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NocoDB (Google Sheets-like UI for PostgreSQL) ──────
  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    environment:
      NC_DB: "pg://postgres:5432?u=finbot&p=finbot_pass&d=finbot_db"
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Bot ─────────────────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8443:8443" # bePaid webhook
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./Slides:/app/slides:ro

volumes:
  pgdata:
